<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Living Dex</title>
    <style>
      :root {
        color-scheme: light dark;

        --bg: #ffffff;
        --bg-surface: #f8fafc;
        --bg-elevated: #ffffff;
        --bg-muted: #f1f5f9;
        --text: #0f172a;
        --text-muted: #64748b;
        --text-subtle: #475569;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --accent: #2563eb;
        --accent-strong: #1e3a8a;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.04);

        --iv-perfect: #a27a00;
        --iv-great: #15803d;
        --iv-low: #b45309;
        --iv-worst: #b91c1c;
      }
      :root[data-theme="dark"] {
        --bg: #0b1220;
        --bg-surface: #111a2e;
        --bg-elevated: #1b2541;
        --bg-muted: #223154;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --text-subtle: #cbd5e1;
        --border: #2a3656;
        --border-strong: #3a4a78;
        --accent: #60a5fa;
        --accent-strong: #bfdbfe;
        --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);

        --iv-perfect: #fcd34d;
        --iv-great: #86efac;
        --iv-low: #fdba74;
        --iv-worst: #fca5a5;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg: #0b1220;
          --bg-surface: #111a2e;
          --bg-elevated: #1b2541;
          --bg-muted: #223154;
          --text: #e2e8f0;
          --text-muted: #94a3b8;
          --text-subtle: #cbd5e1;
          --border: #2a3656;
          --border-strong: #3a4a78;
          --accent: #60a5fa;
          --accent-strong: #bfdbfe;
          --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);

          --iv-perfect: #fcd34d;
          --iv-great: #86efac;
          --iv-low: #fdba74;
          --iv-worst: #fca5a5;
        }
      }
      /* Game-themed accents. Light-mode defaults; dark overrides further down. */
      :root[data-game="ruby"]        { --accent: #dc2626; --accent-strong: #991b1b; }
      :root[data-game="sapphire"]    { --accent: #2563eb; --accent-strong: #1e3a8a; }
      :root[data-game="emerald"]     { --accent: #059669; --accent-strong: #064e3b; }
      :root[data-game="firered"]     { --accent: #ea580c; --accent-strong: #7c2d12; }
      :root[data-game="leafgreen"]   { --accent: #16a34a; --accent-strong: #14532d; }
      :root[data-game="box"]         { --accent: #6366f1; --accent-strong: #3730a3; }

      :root[data-theme="dark"][data-game="ruby"]       { --accent: #fca5a5; --accent-strong: #fee2e2; }
      :root[data-theme="dark"][data-game="sapphire"]   { --accent: #93c5fd; --accent-strong: #dbeafe; }
      :root[data-theme="dark"][data-game="emerald"]    { --accent: #6ee7b7; --accent-strong: #d1fae5; }
      :root[data-theme="dark"][data-game="firered"]    { --accent: #fdba74; --accent-strong: #ffedd5; }
      :root[data-theme="dark"][data-game="leafgreen"]  { --accent: #86efac; --accent-strong: #dcfce7; }
      :root[data-theme="dark"][data-game="box"]        { --accent: #a5b4fc; --accent-strong: #e0e7ff; }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"])[data-game="ruby"]      { --accent: #fca5a5; --accent-strong: #fee2e2; }
        :root:not([data-theme="light"])[data-game="sapphire"]  { --accent: #93c5fd; --accent-strong: #dbeafe; }
        :root:not([data-theme="light"])[data-game="emerald"]   { --accent: #6ee7b7; --accent-strong: #d1fae5; }
        :root:not([data-theme="light"])[data-game="firered"]   { --accent: #fdba74; --accent-strong: #ffedd5; }
        :root:not([data-theme="light"])[data-game="leafgreen"] { --accent: #86efac; --accent-strong: #dcfce7; }
        :root:not([data-theme="light"])[data-game="box"]       { --accent: #a5b4fc; --accent-strong: #e0e7ff; }
      }

      html, body { background: var(--bg); color: var(--text); }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      a { color: inherit; }

      /* Grade-based card emphasis. Higher grade = louder. */
      .grade-card { position: relative; transition: transform 200ms ease; }
      .grade-card-B { box-shadow: 0 0 0 1px #3b82f6, 0 2px 8px rgba(59,130,246,0.15); }
      .grade-card-A {
        border-color: transparent !important;
        background:
          linear-gradient(135deg,
            color-mix(in srgb, #fbbf24 18%, var(--bg-elevated)),
            color-mix(in srgb, #f59e0b 8%, var(--bg-elevated)) 50%,
            color-mix(in srgb, #fde68a 14%, var(--bg-elevated)))
          padding-box,
          linear-gradient(135deg, #fbbf24, #f59e0b, #fde68a) border-box;
        border: 2px solid transparent !important;
        box-shadow: 0 0 18px rgba(245,158,11,0.35), 0 4px 16px rgba(245,158,11,0.25);
        animation: grade-pulse-a 2.4s ease-in-out infinite;
      }
      .grade-card-S {
        box-shadow: 0 0 0 2px #eab308, 0 0 20px rgba(234,179,8,0.45), 0 4px 20px rgba(234,179,8,0.35);
        animation: grade-pulse-s 1.8s ease-in-out infinite;
      }
      .grade-card-SPLUS {
        border-color: transparent !important;
        background:
          linear-gradient(var(--bg-elevated, #fff), var(--bg-elevated, #fff)) padding-box,
          conic-gradient(from 0deg, #f59e0b, #fde68a, #f59e0b, #fbbf24, #fde68a, #f59e0b) border-box;
        border: 2px solid transparent !important;
        box-shadow:
          0 0 24px rgba(245,158,11,0.55),
          0 0 48px rgba(245,158,11,0.35),
          0 8px 32px rgba(245,158,11,0.4);
        animation: grade-spin 4s linear infinite, grade-pulse-splus 1.3s ease-in-out infinite;
      }
      :root[data-theme="dark"] .grade-card-SPLUS,
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) .grade-card-SPLUS {
          background:
            linear-gradient(var(--bg-elevated), var(--bg-elevated)) padding-box,
            conic-gradient(from 0deg, #f59e0b, #fde68a, #f59e0b, #fbbf24, #fde68a, #f59e0b) border-box;
        }
      }
      @keyframes grade-pulse-a {
        0%, 100% { box-shadow: 0 0 18px rgba(245,158,11,0.35), 0 4px 16px rgba(245,158,11,0.25); }
        50%      { box-shadow: 0 0 28px rgba(245,158,11,0.55), 0 6px 22px rgba(245,158,11,0.4); }
      }
      .grade-badge-glow { animation: grade-badge-glow 1.8s ease-in-out infinite; }
      @keyframes grade-badge-glow {
        0%, 100% { filter: drop-shadow(0 0 3px rgba(245,158,11,0.55)); }
        50%      { filter: drop-shadow(0 0 10px rgba(245,158,11,0.95)); }
      }
      @keyframes grade-pulse-s {
        0%, 100% { box-shadow: 0 0 0 2px #eab308, 0 0 20px rgba(234,179,8,0.45), 0 4px 20px rgba(234,179,8,0.35); }
        50%      { box-shadow: 0 0 0 2px #facc15, 0 0 32px rgba(234,179,8,0.7), 0 6px 28px rgba(234,179,8,0.55); }
      }
      @keyframes grade-pulse-splus {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.015); }
      }
      @keyframes grade-spin {
        to { --angle: 360deg; }
      }

      .confetti-layer {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        border-radius: inherit;
      }
      .confetti-piece {
        position: absolute;
        top: -10%;
        width: 8px;
        height: 12px;
        opacity: 0.95;
        animation: confetti-fall linear infinite;
        will-change: transform;
      }
      @keyframes confetti-fall {
        0%   { transform: translate3d(0, -20%, 0) rotate(0deg); opacity: 0; }
        10%  { opacity: 1; }
        100% { transform: translate3d(var(--drift, 20px), 140%, 0) rotate(720deg); opacity: 0.9; }
      }
      .sparkle {
        position: absolute;
        width: 10px;
        height: 10px;
        background: radial-gradient(circle, #fff 0%, #fde68a 40%, transparent 70%);
        border-radius: 50%;
        animation: sparkle-pop 1.6s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes sparkle-pop {
        0%, 100% { transform: scale(0); opacity: 0; }
        50%      { transform: scale(1.4); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .grade-card-A, .grade-card-S, .grade-card-SPLUS { animation: none; }
        .confetti-piece, .sparkle { animation: none; display: none; }
      }

      .dex-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
        gap: 8px;
      }
      .dex-popover {
        position: fixed;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        color: var(--text);
        box-shadow: 0 10px 32px rgba(15, 23, 42, 0.18), 0 2px 6px rgba(15, 23, 42, 0.08);
        text-align: left;
        z-index: 50;
        animation: dex-popover-in 140ms ease-out;
      }
      .dex-popover::after {
        content: "";
        position: absolute;
        left: var(--arrow-left, 50%);
        transform: translateX(-50%);
        border: 7px solid transparent;
      }
      .dex-popover-top::after {
        top: 100%;
        border-top-color: var(--bg-elevated);
        filter: drop-shadow(0 1px 0 var(--border));
      }
      .dex-popover-bottom::after {
        bottom: 100%;
        border-bottom-color: var(--bg-elevated);
        filter: drop-shadow(0 -1px 0 var(--border));
      }
      @keyframes dex-popover-in {
        from { opacity: 0; transform: translateY(2px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .dex-popover { animation: none; }
      }

      .dex-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 8px 4px 6px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--bg-elevated);
        font-size: 10px;
        line-height: 1.2;
        text-align: center;
        overflow: hidden;
        transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        cursor: pointer;
        font-family: inherit;
        color: inherit;
      }
      .dex-cell-selected {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent), 0 4px 12px rgba(15, 23, 42, 0.1);
      }
      .dex-cell-badge {
        position: absolute;
        top: 4px;
        right: 6px;
        background: var(--accent);
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 999px;
        line-height: 1.2;
      }
      .dex-cell:hover {
        transform: translateY(-1px);
        border-color: var(--accent);
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
      }
      .dex-cell-static {
        cursor: default;
      }
      .dex-cell-static:hover {
        transform: none;
        box-shadow: none;
      }
      .dex-cell-static.dex-cell-caught:hover {
        border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
      }
      .dex-cell-static.dex-cell-missing:hover {
        border-color: var(--border);
      }
      .dex-cell-caught {
        border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
        background: color-mix(in srgb, var(--accent) 8%, var(--bg-elevated));
      }
      .dex-cell-stored {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 16%, var(--bg-elevated));
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent);
      }
      .dex-cell-stored::after {
        content: "";
        position: absolute;
        bottom: 4px;
        right: 4px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 2px var(--bg-elevated);
      }
      .dex-cell-missing img {
        filter: grayscale(1) brightness(0) opacity(0.35);
      }
      .dex-cell-num {
        position: absolute;
        top: 4px;
        left: 6px;
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        font-size: 10px;
        opacity: 0.55;
      }
      .dex-cell-name {
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      .dex-cell-missing .dex-cell-name { color: var(--text-muted); }
      .dex-cell img { image-rendering: pixelated; width: 56px; height: 56px; }

      .pokemon-card-name:hover {
        text-decoration-thickness: 2.5px;
      }
      .pokemon-card-name:focus-visible {
        outline: 2px solid var(--accent-strong);
        outline-offset: 3px;
        border-radius: 2px;
      }

      .matchup { display: flex; flex-wrap: wrap; gap: 12px; align-items: stretch; }
      .matchup-card { flex: 1 1 320px; min-width: 0; }
      .matchup-vs { font-size: 24px; font-weight: 700; opacity: 0.4; align-self: center; text-align: center; }
      @media (max-width: 720px) {
        .matchup-card { flex: 1 1 100%; }
        .matchup-vs { flex: 0 0 100%; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
